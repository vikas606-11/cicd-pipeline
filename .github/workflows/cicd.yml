name: CI-CD-Pipeline

on:
push:
branches:
- main

jobs:
test:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.13"

  - name: Install Dependencies
    run: pip install -r requirements.txt

  - name: Run Unit Tests
    run: python -m pytest
```

docker-build:
needs: test
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - name: Build Docker Image
    run: docker build -t cicd-demo .
```
